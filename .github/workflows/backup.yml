name: Auto Backup

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily (UTC time)

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # important for full history

      - name: Push to backup repo
        run: |
          git remote add backup https://github.com/USERNAME/BACKUP-REPO.git
          git push --mirror backup
